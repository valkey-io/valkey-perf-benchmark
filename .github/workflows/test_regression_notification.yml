name: Test Regression Detection

on:
  workflow_dispatch:

permissions:
  issues: write
  contents: read

jobs:
  test-regression-detection:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres
        env:
          POSTGRES_PASSWORD: test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install psycopg2-binary scipy uncertainties

      - name: Insert dummy data
        run: |
          python -c "
          import psycopg2, random
          from datetime import datetime, timezone, timedelta

          conn = psycopg2.connect(host='localhost', port=5432, database='postgres', user='postgres', password='test')
          conn.autocommit = True
          cur = conn.cursor()

          cur.execute('''
            CREATE TABLE benchmark_metrics (
              id SERIAL PRIMARY KEY,
              timestamp TIMESTAMPTZ NOT NULL,
              commit VARCHAR(40) NOT NULL,
              command VARCHAR(50) NOT NULL,
              pipeline INTEGER,
              io_threads INTEGER,
              clients INTEGER,
              data_size INTEGER,
              rps DECIMAL(15,2),
              avg_latency_ms DECIMAL(10,3),
              p50_latency_ms DECIMAL(10,3),
              p95_latency_ms DECIMAL(10,3),
              p99_latency_ms DECIMAL(10,3),
              test_type VARCHAR(50) DEFAULT 'core',
              created_at TIMESTAMPTZ DEFAULT NOW()
            )
          ''')

          random.seed(42)
          now = datetime.now(timezone.utc)
          baseline = 'aaaaaaaabbbbbbbbccccccccdddddddd11111111'
          new_commit = 'eeeeeeeeffffffffgggggggghhhhhhhhiiiiiiii'
          configs = [
            dict(pipeline=1, io_threads=1, clients=1600, data_size=16),
            dict(pipeline=10, io_threads=9, clients=1600, data_size=128),
          ]

          for commit, multiplier, ts in [(baseline, 1.0, now - timedelta(hours=8)), (new_commit, 0.85, now)]:
            for run in range(10):
              noise = 1 + random.uniform(-0.005, 0.005)
              for cmd in ['GET', 'SET']:
                for cfg in configs:
                  cur.execute('''
                    INSERT INTO benchmark_metrics (timestamp, commit, command, pipeline, io_threads, clients, data_size, rps, avg_latency_ms, p50_latency_ms, p95_latency_ms, p99_latency_ms, test_type)
                    VALUES (%s,%s,%s,%s,%s,%s,%s,%s,%s,%s,%s,%s,%s)
                  ''', (ts + timedelta(minutes=run), commit, cmd, cfg['pipeline'], cfg['io_threads'], cfg['clients'], cfg['data_size'], round(500000 * multiplier * noise, 2), 0.5, 0.4, 1.2, 2.0, 'core'))

          conn.close()
          print('Inserted dummy data: baseline=500K RPS, new=425K RPS (15% drop)')
          "

      - name: Detect performance regression
        id: detect_regression
        run: |
          set +e
          report=$(python -m utils.detect_regression \
            --host localhost --port 5432 \
            --database postgres --username postgres --password test \
            --table-name benchmark_metrics \
            --threshold 5 \
            --sslmode disable)
          exit_code=$?
          set -e
          if [ -z "$report" ]; then
            echo "has_regression=false" >> "$GITHUB_OUTPUT"
            echo "::warning::Regression detection produced no output (exit code $exit_code)"
            exit 0
          fi
          report=$(echo "$report" | python -c "import sys,json; print(json.dumps(json.load(sys.stdin)))")
          echo "report=$report" >> "$GITHUB_OUTPUT"
          echo "has_regression=$(echo "$report" | python -c "import sys,json; print(str(json.load(sys.stdin)['has_regression']).lower())")" >> "$GITHUB_OUTPUT"
          echo "new_commit=$(echo "$report" | python -c "import sys,json; print(json.load(sys.stdin)['new_commit'][:8])")" >> "$GITHUB_OUTPUT"
          echo "baseline_commit=$(echo "$report" | python -c "import sys,json; print(json.load(sys.stdin)['baseline_commit'][:8])")" >> "$GITHUB_OUTPUT"

      - name: Open GitHub issue for regression
        if: steps.detect_regression.outputs.has_regression == 'true'
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8
        with:
          github-token: ${{ secrets.AUTOMATION_PAT }}
          script: |
            const report = JSON.parse(process.env.REPORT);
            const newCommitShort = report.new_commit.slice(0, 8);
            const baselineCommitShort = report.baseline_commit.slice(0, 8);
            const title = `[PERF-REGRESSION] ${newCommitShort} vs ${baselineCommitShort}`;
            const label = 'performance-regression';
            const targetOwner = 'hanxizh9910';
            const targetRepo = 'valkey';

            try {
              await github.rest.issues.getLabel({
                owner: targetOwner,
                repo: targetRepo,
                name: label,
              });
            } catch (e) {
              if (e.status === 404) {
                await github.rest.issues.createLabel({
                  owner: targetOwner,
                  repo: targetRepo,
                  name: label,
                  color: 'e11d48',
                  description: 'Performance regression detected by CI',
                });
              }
            }

            // Check for duplicate issues
            const existingIssues = await github.paginate(
              github.rest.issues.listForRepo,
              {
                owner: targetOwner,
                repo: targetRepo,
                labels: label,
                state: 'open',
              },
              (response) => response.data
            );
            const duplicate = existingIssues.find(i => i.title === title);
            if (duplicate) {
              core.info(`Issue already exists: #${duplicate.number} — skipping.`);
              return;
            }

            const lines = report.regressions.map(r => `- ${r.change} ${r.test} (${Math.round(r.baseline_value).toLocaleString()} → ${Math.round(r.new_value).toLocaleString()})`);
            const body = [
              `## Performance Regression Detected`,
              ``,
              `**New commit:** [\`${report.new_commit}\`](https://github.com/valkey-io/valkey/commit/${report.new_commit})`,
              `**Baseline commit:** [\`${report.baseline_commit}\`](https://github.com/valkey-io/valkey/commit/${report.baseline_commit})`,
              `**Threshold:** ${report.threshold_pct}%`,
              ``,
              `### Regressions`,
              ...lines,
              ``,
              `[View on Grafana Dashboard](https://perf-dashboard.valkey.io/public-dashboards/3e45bf8ded3043edaa941331cd1a94e2?from=now-7d&to=now&timezone=UTC)`,
              ``,
              `---`,
              `_Detected automatically by the [continuous benchmark workflow](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})._`,
            ].join('\n');

            await github.rest.issues.create({
              owner: targetOwner,
              repo: targetRepo,
              title,
              body,
              labels: [label],
            });
        env:
          REPORT: ${{ steps.detect_regression.outputs.report }}
